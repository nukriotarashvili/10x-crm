<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10X CRM - Profile</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="brand" id="logoBrand">10X CRM</div>
            <nav class="nav-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="clients.html">Clients</a>
                <a href="profile.html" class="active">Profile</a>
            </nav>
            <div class="sidebar-footer">
                <button id="themeToggle">Theme 🌓</button>
                <button id="logoutBtn">Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1>Profile</h1>
            </div>

            <div class="panel" id="profileInfoBlock">
                Loading profile...
            </div>

            <div class="profile-forms">
                <div class="panel" id="editProfilePanel">
                    <h3>Edit Profile</h3>
                </div>

                <div class="panel" id="changePasswordPanel">
                    <h3>Change Password</h3>
                </div>

                <div class="panel panel--danger">
                    <h3>Data</h3>
                    <button type="button" id="resetDataBtn" class="btn-danger">Reset CRM Data</button>
                </div>
            </div>
        </main>
    </div>
    <script src="js/guard.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
