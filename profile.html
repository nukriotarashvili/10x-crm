<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10X CRM - Profile</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="brand" id="logoBrand">10X CRM</div>
            <nav class="nav-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="clients.html">Clients</a>
                <a href="profile.html" class="active">Profile</a>
            </nav>
            <div class="sidebar-footer">
                <button id="themeToggle">Theme 🌓</button>
                <button id="logoutBtn">Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1>Profile</h1>
            </div>

            <div class="panel" id="profileInfoBlock">
                <!-- User details will be rendered here -->
                Loading profile...
            </div>
            
            <div style="display: grid; gap: 1.5rem; max-width: 600px;">
                <div class="panel">
                    <h3>Edit Profile</h3>
                    <!-- Profile Form skeleton -->
                </div>
                
                <div class="panel">
                    <h3>Change Password</h3>
                    <!-- Password Form skeleton -->
                </div>

                <div class="panel" style="border-color: var(--error-color);">
                    <h3 style="color: var(--error-color); margin-bottom: 1rem;">Data</h3>
                    <button id="resetDataBtn" style="padding: 0.75rem 1rem; background: transparent; color: var(--error-color); border: 1px solid var(--error-color); border-radius: 6px; cursor: pointer;">
                        Reset CRM Data
                    </button>
                </div>
            </div>
        </main>
    </div>
</body>
<script src="js/guard.js"></script>
</html>
