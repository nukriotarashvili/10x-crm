<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>10x CRM — პროფილი</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div class="layout">
    <aside class="layout__sidebar">
      <div class="layout__sidebar-logo">10x CRM</div>
      <nav class="layout__nav">
        <a href="dashboard.html" class="layout__nav-item">დაშბორდი</a>
        <a href="clients.html" class="layout__nav-item">კლიენტები</a>
        <a href="profile.html" class="layout__nav-item layout__nav-item--active">პროფილი</a>
      </nav>
    </aside>

    <div class="layout__main">
      <header class="layout__header">
        <h1 class="layout__header-title">პროფილი</h1>
        <a href="index.html" class="btn btn--secondary">გასვლა</a>
      </header>

      <main class="layout__content">
        <div class="page-header">
          <h2>ჩემი პროფილი</h2>
          <p>განაახლეთ თქვენი პირადი ინფორმაცია.</p>
        </div>

        <div class="profile-grid">
          <div class="profile-avatar">
            <div class="profile-avatar__circle">GB</div>
            <div class="profile-avatar__name">გიორგი ბერიძე</div>
            <div class="profile-avatar__role">ადმინისტრატორი</div>
          </div>

          <div class="card">
            <form>
              <div class="form-group">
                <label for="name">სახელი</label>
                <input type="text" id="name" name="name" value="გიორგი ბერიძე">
              </div>

              <div class="form-group">
                <label for="email">ელ. ფოსტა</label>
                <input type="email" id="email" name="email" value="giorgi@example.com">
              </div>

              <div class="form-group">
                <label for="phone">ტელეფონი</label>
                <input type="tel" id="phone" name="phone" value="+995 555 123 456">
              </div>

              <button type="submit" class="btn btn--primary">შენახვა</button>
            </form>
          </div>
        </div>
      </main>
    </div>
  </div>
</body>
</html>
