<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10X CRM - Clients</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar Navigation (P0) -->
        <aside class="sidebar">
            <div class="brand" id="logoBrand">10X CRM</div>
            <nav class="nav-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="clients.html" class="active">Clients</a>
                <a href="profile.html">Profile</a>
            </nav>
            <div class="sidebar-footer">
                <button id="themeToggle">Theme 🌓</button>
                <button id="logoutBtn">Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1>Clients</h1>
                <button id="addClientBtn" style="padding: 0.75rem 1.5rem; background: var(--primary-color); color: white; border: none; border-radius: 6px; cursor: pointer;">
                    + Add Client
                </button>
            </div>

            <!-- Toolbar (Search, Filter, Sort) -->
            <div class="panel" style="display: flex; gap: 1rem; align-items: center;">
                <input type="text" id="searchInput" placeholder="Search..." style="padding: 0.5rem; border: 1px solid var(--border-color); border-radius: 4px;">
                <div class="filters" style="display: flex; gap: 0.5rem;">
                    <button class="chip active">All</button>
                    <button class="chip">Lead</button>
                    <button class="chip">Contacted</button>
                    <button class="chip">Won</button>
                    <button class="chip">Lost</button>
                </div>
                <select id="sortSelect" style="margin-left: auto; padding: 0.5rem; border: 1px solid var(--border-color); border-radius: 4px;">
                    <option value="newest">Sort: Newest</option>
                    <option value="name">Name A->Z</option>
                    <option value="value">Deal value</option>
                </select>
            </div>

            <!-- Clients List Container -->
            <div id="clientsContainer">
                <div style="text-align: center; padding: 2rem; color: var(--text-secondary);">
                    Loading clients...
                </div>
            </div>
        </main>
    </div>
</body>
</html>
