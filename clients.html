<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10X CRM - Clients</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="brand" id="logoBrand">10X CRM</div>
            <nav class="nav-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="clients.html" class="active">Clients</a>
                <a href="profile.html">Profile</a>
            </nav>
            <div class="sidebar-footer">
                <button id="themeToggle">Theme 🌓</button>
                <button id="logoutBtn">Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1>Clients</h1>
                <button id="addClientBtn" class="btn-primary">+ Add Client</button>
            </div>

            <div class="panel toolbar">
                <input type="text" id="searchInput" class="toolbar-input" placeholder="Search...">
                <div class="filters">
                    <button type="button" class="chip active" data-status="All">All</button>
                    <button type="button" class="chip" data-status="Lead">Lead</button>
                    <button type="button" class="chip" data-status="Contacted">Contacted</button>
                    <button type="button" class="chip" data-status="Won">Won</button>
                    <button type="button" class="chip" data-status="Lost">Lost</button>
                </div>
                <select id="sortSelect" class="toolbar-select">
                    <option value="newest">Sort: Newest</option>
                    <option value="name">Name A→Z</option>
                    <option value="value">Deal value</option>
                </select>
            </div>

            <div id="clientsContainer">
                <div class="loading-state">Loading clients...</div>
            </div>
        </main>
    </div>

    <div id="addClientModal" class="modal-overlay" style="display: none;">
        <div class="modal-card">
            <div class="modal-header">
                <h2>Add Client</h2>
                <button type="button" id="closeModalBtn" class="close-btn">&times;</button>
            </div>
            <form id="addClientForm" novalidate>
                <div class="form-group">
                    <input type="text" id="clientName" placeholder="Name" required>
                </div>
                <div class="form-group">
                    <input type="email" id="clientEmail" placeholder="Email" required>
                </div>
                <div class="form-group">
                    <input type="text" id="clientPhone" placeholder="Phone">
                </div>
                <div class="form-group">
                    <input type="text" id="clientCompany" placeholder="Company">
                </div>
                <div class="form-group">
                    <input type="number" id="clientDealValue" placeholder="Deal Value ($)" required>
                </div>
                <div class="form-group">
                    <select id="clientStatus">
                        <option value="Lead">Lead</option>
                        <option value="Contacted">Contacted</option>
                        <option value="Won">Won</option>
                        <option value="Lost">Lost</option>
                    </select>
                </div>
                <button type="submit">Add Client</button>
            </form>
        </div>
    </div>

    <script src="js/guard.js"></script>
    <script src="js/clients.js"></script>
</body>
</html>
