<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>10x CRM — დაშბორდი</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div class="layout">
    <aside class="layout__sidebar">
      <div class="layout__sidebar-logo">10x CRM</div>
      <nav class="layout__nav">
        <a href="dashboard.html" class="layout__nav-item layout__nav-item--active">დაშბორდი</a>
        <a href="clients.html" class="layout__nav-item">კლიენტები</a>
        <a href="profile.html" class="layout__nav-item">პროფილი</a>
      </nav>
    </aside>

    <div class="layout__main">
      <header class="layout__header">
        <h1 class="layout__header-title">დაშბორდი</h1>
        <a href="index.html" class="btn btn--secondary">გასვლა</a>
      </header>

      <main class="layout__content">
        <div class="page-header">
          <h2>მოგესალმებით!</h2>
          <p>აქ ნახავთ თქვენი CRM-ის მოკლე მიმოხილვას.</p>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-card__label">სულ კლიენტები</div>
            <div class="stat-card__value">128</div>
          </div>
          <div class="stat-card">
            <div class="stat-card__label">აქტიური გარიგებები</div>
            <div class="stat-card__value">24</div>
          </div>
          <div class="stat-card">
            <div class="stat-card__label">ახალი ლიდები</div>
            <div class="stat-card__value">12</div>
          </div>
          <div class="stat-card">
            <div class="stat-card__label">შემოსავალი (თვე)</div>
            <div class="stat-card__value">₾45,200</div>
          </div>
        </div>
      </main>
    </div>
  </div>
</body>
</html>
